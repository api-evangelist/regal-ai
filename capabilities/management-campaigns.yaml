naftiko: 1.0.0-alpha2
info:
  label: Regal Management — Campaigns
  description: List Regal outbound campaigns configured in the tenant.
  tags:
    - Regal
    - Campaigns
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
  - namespace: env
    keys:
      REGAL_API_KEY: REGAL_API_KEY
capability:
  consumes:
    - type: http
      namespace: management-campaigns
      baseUri: https://api.regal.ai/v1
      resources:
        - name: campaigns
          path: /campaigns
          operations:
            - name: listcampaigns
              method: GET
              description: List outbound campaigns in the tenant.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: $.
      authentication:
        type: apikey
        key: Authorization
        value: '{{env.REGAL_API_KEY}}'
        placement: header
  exposes:
    - type: rest
      namespace: management-campaigns-rest
      port: 8080
      resources:
        - path: /v1/campaigns
          name: campaigns
          operations:
            - method: GET
              name: listcampaigns
              call: management-campaigns.listcampaigns
              outputParameters:
                - type: array
                  mapping: $.
    - type: mcp
      namespace: management-campaigns-mcp
      port: 9090
      transport: http
      tools:
        - name: regal-list-campaigns
          description: List Regal outbound campaigns in the tenant.
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: management-campaigns.listcampaigns
          outputParameters:
            - type: array
              mapping: $.
