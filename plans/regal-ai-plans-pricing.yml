description: >-
  Regal does not publish a public pricing tier sheet. Pricing is custom and
  scoped to each customer's volume, features in use, and contract term.
  Discounts are offered for higher spending commitments and multi-year
  contracts. Regal targets enterprises with at least 75 agents or 150,000+
  monthly calls in financial services, healthcare, education, local services,
  and eCommerce.
